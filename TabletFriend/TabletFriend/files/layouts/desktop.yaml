# Add left click, right click, Alt+Space, Home, end, pg up, pg down, caps, prnt screen, ctrl + alt + delete, ctr+y, ctrl+x, alt+left, alt+right

layout_width: 2
button_size: 20
margin: 0

buttons:

    delete:
        action: delete
        size: 1,1
        icon: backspace-reverse-outline
        text: del key
        style: shy

    menuApps:
        action: apps
        size: 1,1
        icon: menu
        text: menu / apps key
        style: shy

    desktop:
        action: lwin+d
        size: 1,1
        icon: monitor
        text: go to desktop
        style: shy

    app-switch:
        actions:
          - toggle alt
          - tab
          - wait 2000
          - toggle alt
        size: 1,1
        icon: application-import
        text: app switcher
        style: shy

    win:
        action: lwin
        size: 1,1
        icon: view-grid
        text: win key
        style: shy

    quickSettings:
        action: lwin+a
        size: 1,1
        icon: tune
        text: quick settings
        style: shy


    spacer0:
        spacer: true
        visibility: docked
        size: 2,1

    select_all:
        action: ctrl+a
        size: 1,1
        icon: card_text
        text: select all
        style: shy
    copy:
        action: ctrl+c
        size: 1,1
        style: shy
        icon: content_copy
        text: copy
    cut:
        action: ctrl+x
        size: 1,1
        icon_stretch: none
        style: shy
        icon: content_cut
        text: cut
    paste:
        action: ctrl+v
        size:  1,1
        style: shy
        icon: content_paste
        text: paste
    enter:
        action: enter
        size: 1,1
        style: shy
        text: ↵
    backspace:
        action: backspace
        size: 1,1
        style: shy
        text: "⌫"
    escape:
        font_weight: 500
        action: escape
        size: 1,1
        style: shy
        text: ⎋
    ctrl:
        action: toggle ctrl
        size: 1,1
        text: ⎈
    alt:
        action: toggle alt
        size: 1,1
        text: ⎇
    shift:
        action: toggle shift
        size: 1,1
        text: ⇧
    keyboard: 
        action: cmd "C:\Program Files\Common Files\microsoft shared\ink\TabTip.exe"
        icon: keyboard
        style: shy
        size: 1,1
    space:
        action: repeat space
        size: 1,1
